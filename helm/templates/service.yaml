apiVersion: v1
kind: Service
metadata:
  name: {{ include "neuron-agent.fullname" . }}
  labels:
    app: neuron-agent
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: neuron-agent
